# The main pipeline for lab7_cicd

resources:
  pipelines:
    lab7_cicd_etl:
      name: lab7_cicd_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/lab7_cicd_etl"

      clusters:
        - label: default
          num_workers: 0
          node_type_id: "Standard_F4"
          spark_conf:
            "spark.databricks.cluster.profile": "singleNode"
            "spark.master": "local[*]"
            "spark.databricks.delta.preview.enabled": "true"

      libraries:
        - glob:
            include: ../src/lab7_cicd_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
