# The main pipeline for lab7_cicd

resources:
  pipelines:
    lab7_cicd_etl:
      name: lab7_cicd_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/lab7_cicd_etl"

      libraries:
        - glob:
            include: ../src/lab7_cicd_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
